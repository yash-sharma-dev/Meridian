syntax = "proto3";

package worldmonitor.news.v1;

import "sebuf/http/annotations.proto";

// GetSummarizeArticleCacheRequest looks up a pre-computed summary by cache key.
message GetSummarizeArticleCacheRequest {
  // Deterministic cache key computed by buildSummaryCacheKey().
  string cache_key = 1 [(sebuf.http.query) = { name: "cache_key" }];
}
